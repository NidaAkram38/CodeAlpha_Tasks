<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music Player</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <div class="player-wrapper">
    <div class="player-card">

      <!-- Vinyl disc -->
      <div class="vinyl-container">
        <div class="vinyl" id="vinyl">
          <div class="vinyl-inner"></div>
          <div class="vinyl-label">
            <span class="vinyl-note">♪</span>
          </div>
        </div>
        <div class="vinyl-needle" id="needle"></div>
      </div>

      <!-- Song info -->
      <div class="song-info">
        <div class="song-title" id="songTitle">Gal Sun</div>
        <div class="song-artist" id="songArtist">Artist 1</div>
      </div>

      <!-- Progress bar -->
      <div class="progress-section">
        <div class="progress-bar-track" id="progressTrack">
          <div class="progress-bar-fill" id="progressFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
        <div class="time-display">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="ctrl-btn secondary" id="prevBtn" title="Previous">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn play-btn" id="playBtn" title="Play/Pause">
          <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="ctrl-btn secondary" id="nextBtn" title="Next">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>

      <!-- Volume -->
      <div class="volume-section">
        <svg class="vol-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
        </svg>
        <div class="volume-track" id="volumeTrack">
          <div class="volume-fill" id="volumeFill" style="width:65%"></div>
          <div class="volume-thumb" id="volumeThumb" style="left:65%"></div>
        </div>
      </div>

      <!-- Playlist -->
      <div class="playlist">
        <div class="playlist-header">Playlist</div>
        <ul class="playlist-list" id="playlistList"></ul>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
